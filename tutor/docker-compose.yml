services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_tutor
    volumes:
      - tutor_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_tutor
    volumes:
      - tutor_audio:/app/data/audio
      - tutor_video:/app/data/video
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5180:80"
    depends_on:
      - api

  # Optional GPU lip-sync (enable with: docker compose --profile musetalk up)
  musetalk:
    profiles: ["musetalk"]
    image: tencent/musetalk:latest
    ports:
      - "7860:7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  tutor_pg_data:
  tutor_audio:
  tutor_video:
