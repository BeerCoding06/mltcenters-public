# Production-style stack: Vite build + Express (static + /api) on one port.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    restart: unless-stopped
