# MLTCENTERS production stack (Vite + Express on port 3000).
# Docker Swarm / Dokploy: Traefik labels MUST be under deploy.labels (not top-level labels).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      DEBUG: ${DEBUG:-false}
      USE_PHP_MAILER: ${USE_PHP_MAILER:-true}
      REGISTER_TO_EMAIL: ${REGISTER_TO_EMAIL:-paradon.pokpingmaung@gmail.com,mltcenterth@gmail.com}
      MAIL_SMTP_USER: ${MAIL_SMTP_USER:-}
      MAIL_SMTP_PASS: ${MAIL_SMTP_PASS:-}
      MAIL_SMTP_FROM: ${MAIL_SMTP_FROM:-}
      MAIL_SMTP_FROM_NAME: ${MAIL_SMTP_FROM_NAME:-MLTCENTERS Workshop}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-smtp.gmail.com}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      ANALYTICS_ENABLED: ${ANALYTICS_ENABLED:-true}
      ANALYTICS_ADMIN_TOKEN: ${ANALYTICS_ADMIN_TOKEN:-}
      ANALYTICS_IP_SALT: ${ANALYTICS_IP_SALT:-}
      DATABASE_URL: ${DATABASE_URL:-}
      ANALYTICS_SQLITE_PATH: ${ANALYTICS_SQLITE_PATH:-}
    env_file:
      - .env
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.docker.network=dokploy-network
        - "traefik.http.routers.mltcenters.rule=Host(`mltcenters.com`,`www.mltcenters.com`)"
        - traefik.http.routers.mltcenters.entrypoints=websecure
        - traefik.http.routers.mltcenters.tls=true
        - traefik.http.routers.mltcenters.tls.certresolver=letsencrypt
        - traefik.http.services.mltcenters.loadbalancer.server.port=3000

networks:
  dokploy-network:
    external: true
