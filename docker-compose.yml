# MLTCENTERS production stack (Vite + Express on port 3000).
# Deploy on Dokploy / Docker Swarm with Traefik v2.11 on dokploy-network.
# Traefik routes https://www.mltcenters.com → this service (no host port publish).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REGISTER_TO_EMAIL: ${REGISTER_TO_EMAIL:-mltcenterth@gmail.com}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
    env_file:
      - .env
    networks:
      - dokploy-network
    # Swarm (Dokploy): Traefik reads deploy.labels on the task/container
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.docker.network=dokploy-network

        # www.mltcenters.com → Express :3000
        - traefik.http.routers.mltcenters-web.rule=Host(`www.mltcenters.com`)
        - traefik.http.routers.mltcenters-web.entrypoints=websecure
        - traefik.http.routers.mltcenters-web.tls=true
        - traefik.http.routers.mltcenters-web.tls.certresolver=letsencrypt
        - traefik.http.routers.mltcenters-web.service=mltcenters-web
        - traefik.http.services.mltcenters-web.loadbalancer.server.port=3000

        # HTTP → HTTPS (www)
        - traefik.http.routers.mltcenters-web-http.rule=Host(`www.mltcenters.com`)
        - traefik.http.routers.mltcenters-web-http.entrypoints=web
        - traefik.http.routers.mltcenters-web-http.middlewares=mltcenters-https
        - traefik.http.middlewares.mltcenters-https.redirectscheme.scheme=https
        - traefik.http.middlewares.mltcenters-https.redirectscheme.permanent=true

        # apex → www (HTTPS)
        - traefik.http.routers.mltcenters-apex.rule=Host(`mltcenters.com`)
        - traefik.http.routers.mltcenters-apex.entrypoints=websecure
        - traefik.http.routers.mltcenters-apex.tls=true
        - traefik.http.routers.mltcenters-apex.tls.certresolver=letsencrypt
        - traefik.http.routers.mltcenters-apex.middlewares=mltcenters-www
        - traefik.http.middlewares.mltcenters-www.redirectregex.regex=^https://mltcenters\.com/(.*)
        - traefik.http.middlewares.mltcenters-www.redirectregex.replacement=https://www.mltcenters.com/$${1}
        - traefik.http.middlewares.mltcenters-www.redirectregex.permanent=true

        # apex HTTP → www HTTPS
        - traefik.http.routers.mltcenters-apex-http.rule=Host(`mltcenters.com`)
        - traefik.http.routers.mltcenters-apex-http.entrypoints=web
        - traefik.http.routers.mltcenters-apex-http.middlewares=mltcenters-apex-to-www
        - traefik.http.middlewares.mltcenters-apex-to-www.redirectregex.regex=^http://mltcenters\.com/(.*)
        - traefik.http.middlewares.mltcenters-apex-to-www.redirectregex.replacement=https://www.mltcenters.com/$${1}
        - traefik.http.middlewares.mltcenters-apex-to-www.redirectregex.permanent=true
    # Non-Swarm (docker compose up): same labels for local Traefik testing
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.mltcenters-web.rule=Host(`www.mltcenters.com`)
      - traefik.http.routers.mltcenters-web.entrypoints=websecure
      - traefik.http.routers.mltcenters-web.tls=true
      - traefik.http.routers.mltcenters-web.tls.certresolver=letsencrypt
      - traefik.http.routers.mltcenters-web.service=mltcenters-web
      - traefik.http.services.mltcenters-web.loadbalancer.server.port=3000
      - traefik.http.routers.mltcenters-web-http.rule=Host(`www.mltcenters.com`)
      - traefik.http.routers.mltcenters-web-http.entrypoints=web
      - traefik.http.routers.mltcenters-web-http.middlewares=mltcenters-https
      - traefik.http.middlewares.mltcenters-https.redirectscheme.scheme=https
      - traefik.http.middlewares.mltcenters-https.redirectscheme.permanent=true
      - traefik.http.routers.mltcenters-apex.rule=Host(`mltcenters.com`)
      - traefik.http.routers.mltcenters-apex.entrypoints=websecure
      - traefik.http.routers.mltcenters-apex.tls=true
      - traefik.http.routers.mltcenters-apex.tls.certresolver=letsencrypt
      - traefik.http.routers.mltcenters-apex.middlewares=mltcenters-www
      - traefik.http.middlewares.mltcenters-www.redirectregex.regex=^https://mltcenters\.com/(.*)
      - traefik.http.middlewares.mltcenters-www.redirectregex.replacement=https://www.mltcenters.com/$${1}
      - traefik.http.middlewares.mltcenters-www.redirectregex.permanent=true
      - traefik.http.routers.mltcenters-apex-http.rule=Host(`mltcenters.com`)
      - traefik.http.routers.mltcenters-apex-http.entrypoints=web
      - traefik.http.routers.mltcenters-apex-http.middlewares=mltcenters-apex-to-www
      - traefik.http.middlewares.mltcenters-apex-to-www.redirectregex.regex=^http://mltcenters\.com/(.*)
      - traefik.http.middlewares.mltcenters-apex-to-www.redirectregex.replacement=https://www.mltcenters.com/$${1}
      - traefik.http.middlewares.mltcenters-apex-to-www.redirectregex.permanent=true

networks:
  dokploy-network:
    external: true
